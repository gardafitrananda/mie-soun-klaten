<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Mie Soun Klaten</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .login-box h2 { color: #E65100; margin-top: 0; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        .btn-login { width: 100%; padding: 0.75rem; background: #FF7043; color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        .btn-login:hover { background: #E65100; }
        .error-msg { color: #d32f2f; font-size: 0.85rem; margin-top: 1rem; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🍜 Admin Login</h2>
    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Masukkan username">
    </div>
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Masukkan password">
    </div>
    <button class="btn-login" onclick="prosesLogin()">Masuk Dashboard</button>
    <div class="error-msg" id="errorMsg">Username atau password salah!</div>
</div>

<script>
    // Cek jika sudah login, langsung tendang ke admin
    if (localStorage.getItem('admin_token') === 'miesecret2026') {
        window.location.href = '/admin/index.html';
    }

    function prosesLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Hardcode kredensial untuk sementara
        if (user === 'admin' && pass === 'admin123') {
            // Simpan token rahasia di browser
            localStorage.setItem('admin_token', 'miesecret2026');
            window.location.href = '/admin/index.html';
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    // Login pakai tombol Enter
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') prosesLogin();
    });
</script>
</body>
</html>
