<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Test — Mie Soun Klaten</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- CSS Admin -->
    <link rel="stylesheet" href="/admin/css/style.css" />
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="logo"><i class="fas fa-utensils"></i> Admin</div>
        <nav>
            <a href="#" class="active" data-tab="products"><i class="fas fa-box"></i> Produk</a>
            <a href="#" data-tab="testimonials"><i class="fas fa-star"></i> Testimoni</a>
            <a href="#" data-tab="gallery"><i class="fas fa-images"></i> Galeri</a>
            <a href="#" data-tab="content"><i class="fas fa-globe"></i> Konten Web</a>
            <a href="#" data-tab="users"><i class="fas fa-users-cog"></i> User</a>
        </nav>
        <div style="padding: 20px; margin-top: 30px;">
        <button onclick="logoutAdmin()" style="width: 100%; background: transparent; color: #ff7043; border: 2px solid #ff7043; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</div>
        <div class="user">
            <div class="avatar">A</div>
            <div class="info">
                <div class="name">Admin</div>
                <div class="role">Administrator</div>
            </div>
            <a href="#" class="logout" onclick="alert('Logout (mock)')"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </aside>

    <!-- ===== OVERLAY (mobile) ===== -->
    <div class="overlay" id="overlay"></div>

    <!-- ===== MAIN ===== -->
    <div class="main">

        <!-- Header -->
        <div class="header">
            <div style="display:flex;align-items:center;gap:12px;">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <h1 id="pageTitle">Manajemen Produk</h1>
            </div>
            <div class="actions">
                <input type="text" placeholder="Cari..." id="searchInput" />
                <button class="btn btn-primary" id="btnAdd"><i class="fas fa-plus"></i> Tambah</button>
            </div>
        </div>

        <!-- Panel: Produk -->
        <div class="panel" id="panel-products">
            <div class="card">
                <table>
                    <thead><tr><th>ID</th><th>Nama Produk</th><th>Harga Jual</th><th>Badge / Status</th><th>Aksi</th></tr></thead>
                    <tbody id="productsBody"></tbody>
                </table>
            </div>
        </div>

      

        <!-- Panel: Testimoni -->
        <div class="panel" id="panel-testimonials" style="display:none;">
            <div class="card">
                <table>
                    <thead><tr><th>ID</th><th>Nama</th><th>Testimoni</th><th>Rating</th><th>Aksi</th></tr></thead>
                    <tbody id="testimonialsBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Panel: Galeri -->
         <div class="panel" id="panel-gallery" style="display:none;">
     <div class="card">
         <table>
             <thead>
                 <tr>
                     <th>ID</th>
                     <th>Foto</th>
                     <th>Teks / Label</th>
                     <th>Layout CSS</th>
                     <th>Aksi</th>
                 </tr>
             </thead>
             <tbody id="galleryBody"></tbody>
         </table>
     </div>
 </div>

        <!-- Panel: Konten Web -->
<div class="panel" id="panel-content" style="display:none;">
    <div class="card" style="max-width: 800px;">
        <h3 style="margin-bottom: 20px;">Edit Konten Halaman Utama</h3>
        <div class="form-group"><label>Judul Utama (Hero)</label><input id="c_hero_title" /></div>
        <div class="form-group"><label>Sub-judul (Hero)</label><input id="c_hero_subtitle" /></div>
        <div class="form-group"><label>Teks Tentang Kami</label><textarea id="c_about_text" rows="5"></textarea></div>

        <div class="form-group" style="background:#f9f9f9; padding:1rem; border-radius:8px; border:1px dashed #ccc;">
            <label>Foto Latar Utama (Hero Image)</label>
            <input type="file" accept="image/*" onchange="previewHeroImage(this)" style="margin-bottom:10px;" />
            <input type="hidden" id="c_hero_image" />
            <div><img id="c_img_preview" src="" style="max-height:150px; border-radius:5px;"></div>
        </div>

        <button onclick="saveContent()" style="background: var(--orange); color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%;">
            Simpan Perubahan Konten
        </button>
    </div>
</div>

        <!-- Panel: Users -->
        <div class="panel" id="panel-users" style="display:none;">
            <div class="card">
                <table>
                    <thead><tr><th>ID</th><th>Nama</th><th>Email</th><th>Role</th><th>Aksi</th></tr></thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
            <div class="form-actions">
                <button class="btn btn-outline" onclick="closeModal()">Batal</button>
                <button class="btn btn-success" id="saveBtn">Simpan</button>
            </div>
        </div>
    </div>

    <!-- ===== JS Admin ===== -->
    <script src="/admin/js/script.js"></script>

</body>
</html>
